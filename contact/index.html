<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Contact | Tendring Democracy Project</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="tag">
TENDRING DEMOCRACY PROJECT
</div>

<h1>
CONTACT
</h1>

</div>

</section>

<section class="form-section">

<div class="container form-container">

<form id="contact-form" class="pledge-form">

<div class="form-group">
<input
type="text"
id="name"
name="name"
placeholder="Name (required)"
required>
</div>

<div class="form-group">
<input
type="email"
id="email"
name="email"
placeholder="Email Address (required)"
pattern=".+@.+"
title="Please enter a valid email address containing @"
required>
</div>

<div class="form-group">
<textarea
id="message"
name="message"
placeholder="Message"
required></textarea>
</div>

<p id="error" class="error-message"></p>

<button class="btn primary btn-large" id="submit-button" type="submit">
SEND MESSAGE →
</button>

</form>

</div>

</section>

<footer>

Promoted by Tendring Democracy Project, all at PO Box 2002, Clacton-on-Sea, CO15 1JA. Click <a href="../privacy/">here</a> for our privacy policy and data protection statement.

</footer>

<script>

const form = document.getElementById("contact-form");

form.addEventListener("submit", async function(event) {
  event.preventDefault();

  const submitButton = document.getElementById("submit-button");
  const error = document.getElementById("error");
  submitButton.disabled = true;
  error.innerText = "";

  const data = {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    message: document.getElementById("message").value.trim()
  };

  try {
    const response = await fetch(
      "https://tendring-contact.twells-tet.workers.dev",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      }
    );

    const result = await response.json();

    if (result.success) {
      error.innerText = "Thank you. Your message has been sent.";
      error.style.color = "#e31b23";
      form.reset();
    } else {
      error.innerText = result.error || "There was a problem. Please try again.";
    }
  } catch (err) {
    error.innerText = "Service unavailable. Please try again later.";
    console.error(err);
  }

  submitButton.disabled = false;
});

</script>

</body>

</html>
