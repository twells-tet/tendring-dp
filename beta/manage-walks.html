<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Walks | TARIAN</title>
  <link rel="icon" type="image/svg+xml" href="tarian-shield.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="page-header">
    <a href="index.html" class="page-header-logo-link" aria-label="TARIAN home">
      <img src="tarian-shield.svg" alt="" class="page-header-logo">
    </a>
    <h1>TARIAN</h1>
    <p class="page-subtitle">Manage Walks</p>
  </header>

  <main class="app-shell">

    <section class="panel">
      <h2>Manage Walks</h2>

      <p><a href="index.html" class="back-link">&larr; back to main list</a></p>

      <p class="manage-walks-intro">
        Choose a Subroad to see every household on it, in delivery/canvass
        Sort Order. Reach this page by clicking "Sort Order" against any
        household on the main list.
      </p>

      <div class="manage-walks-picker">
        <label for="subroad-select">Subroad</label>
        <select id="subroad-select"></select>
      </div>

      <p id="manage-walks-message" class="message" role="status" aria-live="polite"></p>
      <p id="manage-walks-summary" class="current-list-summary"></p>

      <div class="current-list-wrapper">
        <table class="current-list-table">
          <thead>
            <tr>
              <th>Sort Order</th>
              <th>Address</th>
              <th>Electors</th>
              <th>Walk</th>
              <th>Deliverer</th>
              <th>Polling District</th>
            </tr>
          </thead>
          <tbody id="manage-walks-body"></tbody>
        </table>
      </div>

    </section>

  </main>

  <script>

    const STORAGE_KEYS = {
      sheetUrl: "abersoch-sheet-url",
      progress: "abersoch-elector-progress-v1",
      areaOverrides: "abersoch-area-overrides-v1"
    };

    const DEFAULT_SHEET_URL =
      "https://docs.google.com/spreadsheets/d/1OS8iu7s0CAD__v1i_2kIOiIGvgmNiRN3KAAI4V9XyaE/edit?usp=sharing";

    // Hard cap on the number of households Manage Walks will ever render
    // for a single Subroad.
    const MAX_HOUSEHOLDS = 999;

    // Words that should never appear in address fields - these are the
    // town/county names that are already covered by the dedicated Post
    // Town field, so repeating them here is just noise/duplication.
    const EXCLUDED_TOWN_WORDS = ["PWLLHELI", "GWYNEDD"];

    const WELSH_LOWERCASE = new Set([
      "a", "ac", "â", "i", "o", "y", "yr", "yn", "am", "ar", "at", "dan", "dros",
      "drwy", "heb", "tan", "tros", "trwy", "wrth",
      "a'r", "i'r", "o'r", "y'r", "yr", "â'r"
    ]);

    const messageEl =
      document.getElementById("manage-walks-message");

    const summaryEl =
      document.getElementById("manage-walks-summary");

    const bodyEl =
      document.getElementById("manage-walks-body");

    const subRoadSelectEl =
      document.getElementById("subroad-select");

    function loadFromStorage(key, fallback) {

      try {

        const raw = localStorage.getItem(key);

        if (!raw) {
          return fallback;
        }

        return JSON.parse(raw);

      } catch (error) {
        return fallback;
      }

    }

    function toGoogleCsvUrl(rawUrl) {

      if (
        rawUrl.includes("output=csv") ||
        rawUrl.includes("/export?format=csv")
      ) {
        return rawUrl;
      }

      const match = rawUrl.match(/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);

      if (!match) {
        return rawUrl;
      }

      const sheetId = match[1];
      const gidMatch = rawUrl.match(/[?&#]gid=([0-9]+)/);
      const gid = gidMatch ? gidMatch[1] : "0";

      return (
        "https://docs.google.com/spreadsheets/d/" +
        sheetId +
        "/export?format=csv&gid=" +
        gid
      );

    }

    function parseCsv(csvText) {

      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < csvText.length; i += 1) {

        const char = csvText[i];
        const next = csvText[i + 1];

        if (char === "\"" && inQuotes && next === "\"") {
          value += "\"";
          i += 1;
          continue;
        }

        if (char === "\"") {
          inQuotes = !inQuotes;
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {

          if (char === "\r" && next === "\n") {
            i += 1;
          }

          row.push(value);
          rows.push(row);
          row = [];
          value = "";
          continue;

        }

        value += char;

      }

      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;

    }

    function normalizeHeader(value) {
      return (value || "").trim().toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function formatPostalProxy(value) {

      const cleaned = String(value || "").trim();
      const normalized = normalizeText(cleaned);

      if (!normalized) {
        return "";
      }

      if (normalized.includes("postal")) {
        return "Postal";
      }

      if (normalized.includes("proxy")) {
        return "Proxy";
      }

      return cleaned;

    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // Splits a raw address value on commas (address columns sometimes
    // contain an embedded comma, e.g. "BODORWEL,BWLCH"), drops any
    // segment matching an excluded town/county word (already covered
    // by the dedicated Post Town field), and rejoins the remainder.
    function stripExcludedTownWords(value) {

      return String(value || "")
        .split(",")
        .map(segment => segment.trim())
        .filter(Boolean)
        .filter(segment => !EXCLUDED_TOWN_WORDS.includes(segment.toUpperCase()))
        .join(", ");

    }

    // Converts an ALL CAPS address string into Welsh-aware sentence
    // case, leaving common short Welsh words (e.g. "gyda", "yn") in
    // lower case when they are not the first word.
    function welshProperCase(str) {

      if (!str) {
        return str;
      }

      return str
        .toLowerCase()
        .replace(/\S+/g, (word, offset) => {

          const core =
            word
              .replace(/^[^a-zA-Z']+|[^a-zA-Z']+$/g, "")
              .toLowerCase();

          if (offset > 0 && WELSH_LOWERCASE.has(core)) {
            return word;
          }

          return word.replace(/[a-zA-Z]/, ch => ch.toUpperCase());

        });

    }

    // Address 3 through Address 9 (spreadsheet columns D-J) are combined
    // into a single "Address Line 3" field, with the town/county words
    // that duplicate the Post Town field stripped out.
    function buildAddressLine3(data) {

      const fields = [
        "address3", "address4", "address5",
        "address6", "address7", "address8", "address9"
      ];

      const segments =
        fields
          .map(field => stripExcludedTownWords(data[field]))
          .filter(Boolean);

      return welshProperCase(segments.join(", "));

    }

    // Best-effort derivation of the road/area name from the address,
    // used only as a fallback when neither the Subroad column (AO) nor
    // a manual override is available for a household.
    function formatHouseholdArea(elector) {

      if (!elector) {
        return "";
      }

      const line1 = String(elector.addressLine1 || "").trim();
      const line2 = String(elector.addressLine2 || "").trim();

      const segments =
        [line1, line2]
          .filter(Boolean)
          .join(",")
          .split(",")
          .map(segment => segment.trim())
          .filter(Boolean);

      const firstToken =
        segments[0] ? segments[0].split(/\s+/)[0] : "";

      const hasNumber = /\d/.test(firstToken);

      function stripLeadingNumber(segment) {
        if (!segment) {
          return "";
        }
        const token = segment.split(/\s+/)[0];
        if (/\d/.test(token)) {
          return segment.slice(token.length).trim();
        }
        return segment;
      }

      let area;

      if (hasNumber) {
        area =
          (
            stripLeadingNumber(segments[0]) ||
            stripLeadingNumber(segments[1] || "") ||
            ""
          ).toUpperCase();
      } else {
        area =
          stripLeadingNumber(segments[1] || segments[0] || "")
            .toUpperCase();
      }

      return area;

    }

    function mapRowToElector(row, headers, index) {

      const data = {};

      headers.forEach((header, idx) => {
        data[header] = (row[idx] || "").trim();
      });

      const sourceRow = index + 2;

      const id =
        data.electorid ||
        row[20] ||
        ("row-" + sourceRow);

      const name =
        data.electorname ||
        data.name ||
        data.elector ||
        "";

      return {

        id: String(id),

        name,

        householdId:
          data.householdid ||
          row[19] ||
          "",

        addressLine1: welshProperCase(stripExcludedTownWords(data.address1)),

        addressLine2: welshProperCase(stripExcludedTownWords(data.address2)),

        addressLine3: buildAddressLine3(data),

        postcode: data.postcode || "",

        postalProxy:
          formatPostalProxy(
            data.postalproxy ||
            data.postalorproxy ||
            row[17] ||
            ""
          ),

        pollingDistrict:
          data.pollingdistrict ||
          data.pollingdist ||
          data.district ||
          data.pd ||
          row[15] ||
          "",

        deliveryWalk:
          data.walk ||
          row[37] ||
          "",

        deliveryOrder:
          data.deliveryorder ||
          row[38] ||
          "",

        deliverer:
          data.deliverer ||
          row[39] ||
          "",

        subRoad:
          data.subroad ||
          row[40] ||
          "",

        householdGroupKey:
          normalizeText(
            data.householdkey ||
            data.key ||
            row[11] ||
            ""
          )

      };

    }

    function getElectorProgress(electorId, progress) {

      const existing = progress[electorId] || {};

      return {
        doNotDeliver: Boolean(existing.doNotDeliver),
        doNotContact: Boolean(existing.doNotContact)
      };

    }

    function hasAntiPlaidFlag(progress) {
      return Boolean(progress && (progress.doNotDeliver || progress.doNotContact));
    }

    // Applies any manual Subroad override saved against a household,
    // falling back to the Subroad column, then a best-effort guess.
    function resolveSubRoad(elector, areaOverrides) {

      const householdKey = elector.householdGroupKey;

      if (
        householdKey &&
        areaOverrides[householdKey] !== undefined
      ) {
        return areaOverrides[householdKey];
      }

      return elector.subRoad || formatHouseholdArea(elector);

    }

    function buildHouseholds(electors, areaOverrides) {

      const householdsByKey = new Map();

      electors.forEach(elector => {

        const key =
          elector.householdId ||
          elector.householdGroupKey;

        if (!key) {
          return;
        }

        if (!householdsByKey.has(key)) {

          householdsByKey.set(key, {
            householdKey: key,
            addressLine1: elector.addressLine1,
            addressLine2: elector.addressLine2,
            addressLine3: elector.addressLine3,
            postcode: elector.postcode,
            pollingDistrict: elector.pollingDistrict,
            subRoad: resolveSubRoad(elector, areaOverrides),
            deliveryOrder: elector.deliveryOrder,
            deliveryWalk: elector.deliveryWalk,
            deliverer: elector.deliverer,
            electorNames: []
          });

        }

        const household = householdsByKey.get(key);

        if (elector.name) {
          household.electorNames.push(elector.name);
        }

        if (!household.deliveryOrder && elector.deliveryOrder) {
          household.deliveryOrder = elector.deliveryOrder;
        }

        if (!household.deliveryWalk && elector.deliveryWalk) {
          household.deliveryWalk = elector.deliveryWalk;
        }

        if (!household.deliverer && elector.deliverer) {
          household.deliverer = elector.deliverer;
        }

      });

      return Array.from(householdsByKey.values());

    }

    function formatAddress(household) {

      return (
        [
          household.addressLine1,
          household.addressLine2,
          household.addressLine3,
          household.postcode
        ]
          .filter(Boolean)
          .join(", ")
      );

    }

    function sortByDeliveryOrder(households) {

      households.sort((a, b) => {

        const orderA = parseFloat(a.deliveryOrder);
        const orderB = parseFloat(b.deliveryOrder);

        const validA = !isNaN(orderA);
        const validB = !isNaN(orderB);

        if (validA && validB && orderA !== orderB) {
          return orderA - orderB;
        }

        if (validA !== validB) {
          return validA ? -1 : 1;
        }

        return String(a.deliveryOrder).localeCompare(String(b.deliveryOrder));

      });

    }

    function renderTable(households) {

      bodyEl.innerHTML =
        households.map(household => {

          const cells = [
            household.deliveryOrder || "—",
            formatAddress(household),
            household.electorNames.join(", "),
            household.deliveryWalk,
            household.deliverer,
            household.pollingDistrict
          ];

          return (
            "<tr>" +
            cells.map(cell => "<td>" + escapeHtml(cell || "") + "</td>").join("") +
            "</tr>"
          );

        }).join("");

    }

    function populateSubRoadPicker(allHouseholds, selectedSubRoad) {

      const subRoadNames =
        Array.from(
          new Set(
            allHouseholds
              .map(h => h.subRoad)
              .filter(Boolean)
          )
        ).sort((a, b) => a.localeCompare(b));

      subRoadSelectEl.innerHTML =
        "<option value=\"\">Choose a Subroad…</option>" +
        subRoadNames.map(name =>
          "<option value=\"" + escapeHtml(name) + "\"" +
          (
            normalizeText(name) === normalizeText(selectedSubRoad)
              ? " selected"
              : ""
          ) +
          ">" + escapeHtml(name) + "</option>"
        ).join("");

    }

    function showHouseholdsForSubRoad(allHouseholds, subRoad) {

      if (!subRoad) {
        bodyEl.innerHTML = "";
        summaryEl.textContent = "";
        messageEl.textContent = "Choose a Subroad above to see its households.";
        return;
      }

      const wanted = normalizeText(subRoad);

      const matched =
        allHouseholds.filter(
          household => normalizeText(household.subRoad) === wanted
        );

      sortByDeliveryOrder(matched);

      const totalMatched = matched.length;
      const truncated = totalMatched > MAX_HOUSEHOLDS;
      const shown = matched.slice(0, MAX_HOUSEHOLDS);

      renderTable(shown);

      messageEl.textContent = "";

      summaryEl.textContent =
        shown.length +
        " household" + (shown.length === 1 ? "" : "s") +
        " shown for Subroad \"" + subRoad + "\", in Sort Order." +
        (
          truncated
            ? " Only the first " + MAX_HOUSEHOLDS + " households are shown (" +
              totalMatched + " matched)."
            : ""
        );

    }

    async function init() {

      const sheetUrl =
        localStorage.getItem(STORAGE_KEYS.sheetUrl) ||
        DEFAULT_SHEET_URL;

      const progress =
        loadFromStorage(STORAGE_KEYS.progress, {});

      const areaOverrides =
        loadFromStorage(STORAGE_KEYS.areaOverrides, {});

      const params = new URLSearchParams(window.location.search);
      const requestedSubRoad = params.get("subroad") || "";

      messageEl.textContent = "Loading electors...";

      try {

        const csvUrl = toGoogleCsvUrl(sheetUrl);
        const response = await fetch(csvUrl);

        if (!response.ok) {
          throw new Error("Could not fetch sheet data.");
        }

        const csvText = await response.text();
        const rows = parseCsv(csvText);
        const headers = rows[0].map(h => normalizeHeader(h));

        const electors =
          rows
            .slice(1)
            .map((row, index) => mapRowToElector(row, headers, index))
            .filter(e => e.name)
            .filter(e => !hasAntiPlaidFlag(getElectorProgress(e.id, progress)));

        const allHouseholds =
          buildHouseholds(electors, areaOverrides);

        populateSubRoadPicker(allHouseholds, requestedSubRoad);

        showHouseholdsForSubRoad(allHouseholds, requestedSubRoad);

        subRoadSelectEl.addEventListener("change", () => {

          const params = new URLSearchParams(window.location.search);

          if (subRoadSelectEl.value) {
            params.set("subroad", subRoadSelectEl.value);
          } else {
            params.delete("subroad");
          }

          window.history.replaceState(
            null,
            "",
            window.location.pathname + (params.toString() ? "?" + params.toString() : "")
          );

          showHouseholdsForSubRoad(allHouseholds, subRoadSelectEl.value);

        });

      } catch (error) {
        messageEl.textContent = "Unable to load sheet: " + error.message;
      }

    }

    init();

  </script>

</body>
</html>
