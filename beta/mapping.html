<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Household Map | TARIAN</title>
  <link rel="icon" type="image/svg+xml" href="tarian-shield.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

  <header class="page-header">
    <a href="index.html" class="page-header-logo-link" aria-label="TARIAN home">
      <img src="tarian-shield.svg" alt="" class="page-header-logo">
    </a>
    <h1>TARIAN</h1>
    <p class="page-subtitle">Household Map</p>
  </header>

  <main class="app-shell">

    <section class="panel">
      <h2>Household Map</h2>

      <p><a href="index.html" class="back-link">&larr; back to main list</a></p>

      <p id="mapping-message" class="message" role="status" aria-live="polite"></p>
      <p id="mapping-summary" class="current-list-summary"></p>

      <div class="mapping-controls">
        <button type="button" id="show-walks-toggle" class="show-walks-toggle-button">Show Delivery Walks</button>

        <div class="manage-walks-picker-row" id="walk-district-row" hidden>
          <label for="walk-district-select">Polling District</label>
          <select id="walk-district-select">
            <option value="RA1">RA1 (Abersoch)</option>
            <option value="QB6">QB6 (Llanengan)</option>
          </select>
        </div>
      </div>

      <div id="walk-key" class="walk-key" hidden></div>

      <div id="household-map" class="household-map"></div>

    </section>

  </main>

  <script>

    const STORAGE_KEYS = {
      sheetUrl: "abersoch-sheet-url",
      progress: "abersoch-elector-progress-v1",
      areaOverrides: "abersoch-area-overrides-v1",
      mappingFilter: "abersoch-mapping-filter",
      walkOverrides: "abersoch-walk-overrides-v1",
      walkDescriptions: "abersoch-walk-descriptions-v1"
    };

    // Kept in sync with the Manage Walks page's seed values, so both
    // pages agree on Walk 1's name before anyone edits it there.
    const DEFAULT_WALK_DESCRIPTIONS = {
      "ra1|1": "High Street and Harbour",
      "qb6|1": "Farms and remote properties"
    };

    const DEFAULT_SHEET_URL =
      "https://docs.google.com/spreadsheets/d/1OS8iu7s0CAD__v1i_2kIOiIGvgmNiRN3KAAI4V9XyaE/edit?usp=sharing";

    // Hard cap on the number of households the map will ever plot,
    // regardless of how many households match the active filters.
    const MAX_HOUSEHOLDS = 1999;

    // Safety limit: if plotting the filtered households would generate
    // more markers than this, the map is not loaded at all (to avoid
    // freezing the browser). The user should apply a narrower filter.
    const MAX_MARKERS = 999;

    // Words that should never appear in address fields - these are the
    // town/county names that are already covered by the dedicated Post
    // Town field, so repeating them here is just noise/duplication.
    const EXCLUDED_TOWN_WORDS = ["PWLLHELI", "GWYNEDD"];

    // Distinct colours for each of the 5 delivery Walks, used when
    // "Show delivery walks" is switched on.
    const WALK_COLORS = {
      "1": "#3366cc",
      "2": "#3cb44b",
      "3": "#f58231",
      "4": "#b19cd9",
      "5": "#e6194b"
    };

    const DEFAULT_MARKER_COLOR = "#da291c";

    const WELSH_LOWERCASE = new Set([
      "a", "ac", "â", "i", "o", "y", "yr", "yn", "am", "ar", "at", "dan", "dros",
      "drwy", "heb", "tan", "tros", "trwy", "wrth",
      "a'r", "i'r", "o'r", "y'r", "yr", "â'r"
    ]);

    const messageEl =
      document.getElementById("mapping-message");

    const summaryEl =
      document.getElementById("mapping-summary");

    const mapEl =
      document.getElementById("household-map");

    const showWalksToggleEl =
      document.getElementById("show-walks-toggle");

    const walkDistrictRowEl =
      document.getElementById("walk-district-row");

    const walkDistrictSelectEl =
      document.getElementById("walk-district-select");

    const walkKeyEl =
      document.getElementById("walk-key");

    function loadFromStorage(key, fallback) {

      try {

        const raw = localStorage.getItem(key);

        if (!raw) {
          return fallback;
        }

        return JSON.parse(raw);

      } catch (error) {
        return fallback;
      }

    }

    function toGoogleCsvUrl(rawUrl) {

      if (
        rawUrl.includes("output=csv") ||
        rawUrl.includes("/export?format=csv")
      ) {
        return rawUrl;
      }

      const match = rawUrl.match(/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);

      if (!match) {
        return rawUrl;
      }

      const sheetId = match[1];
      const gidMatch = rawUrl.match(/[?&#]gid=([0-9]+)/);
      const gid = gidMatch ? gidMatch[1] : "0";

      return (
        "https://docs.google.com/spreadsheets/d/" +
        sheetId +
        "/export?format=csv&gid=" +
        gid
      );

    }

    function parseCsv(csvText) {

      const rows = [];
      let row = [];
      let value = "";
      let inQuotes = false;

      for (let i = 0; i < csvText.length; i += 1) {

        const char = csvText[i];
        const next = csvText[i + 1];

        if (char === "\"" && inQuotes && next === "\"") {
          value += "\"";
          i += 1;
          continue;
        }

        if (char === "\"") {
          inQuotes = !inQuotes;
          continue;
        }

        if (char === "," && !inQuotes) {
          row.push(value);
          value = "";
          continue;
        }

        if ((char === "\n" || char === "\r") && !inQuotes) {

          if (char === "\r" && next === "\n") {
            i += 1;
          }

          row.push(value);
          rows.push(row);
          row = [];
          value = "";
          continue;

        }

        value += char;

      }

      if (value.length || row.length) {
        row.push(value);
        rows.push(row);
      }

      return rows;

    }

    function normalizeHeader(value) {
      return (value || "").trim().toLowerCase().replace(/[^a-z0-9]/g, "");
    }

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function formatPostalProxy(value) {

      const cleaned = String(value || "").trim();
      const normalized = normalizeText(cleaned);

      if (!normalized) {
        return "";
      }

      if (normalized.includes("postal")) {
        return "Postal";
      }

      if (normalized.includes("proxy")) {
        return "Proxy";
      }

      return cleaned;

    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // Splits a raw address value on commas (address columns sometimes
    // contain an embedded comma, e.g. "BODORWEL,BWLCH"), drops any
    // segment matching an excluded town/county word (already covered
    // by the dedicated Post Town field), and rejoins the remainder.
    function stripExcludedTownWords(value) {

      return String(value || "")
        .split(",")
        .map(segment => segment.trim())
        .filter(Boolean)
        .filter(segment => !EXCLUDED_TOWN_WORDS.includes(segment.toUpperCase()))
        .join(", ");

    }

    // Converts an ALL CAPS address string into Welsh-aware sentence
    // case, leaving common short Welsh words (e.g. "gyda", "yn") in
    // lower case when they are not the first word.
    function welshProperCase(str) {

      if (!str) {
        return str;
      }

      // Track whether we've already capitalised the first "real"
      // (letter-containing) word - a leading house-number token like
      // "1" doesn't count, so the actual first word of a place name
      // (e.g. "Tan" in "1 Tan y Fynwent") is always capitalised, even
      // if it would otherwise be a lower-cased Welsh word later on.
      let firstWordSeen = false;

      return str
        .toLowerCase()
        .replace(/\S+/g, word => {

          const core =
            word
              .replace(/^[^a-zA-Z']+|[^a-zA-Z']+$/g, "")
              .toLowerCase();

          const isWordLike = /[a-zA-Z]/.test(word);

          if (isWordLike) {

            if (firstWordSeen && WELSH_LOWERCASE.has(core)) {
              return word;
            }

            firstWordSeen = true;

          }

          return word.replace(/[a-zA-Z]/, ch => ch.toUpperCase());

        });

    }

    function mapRowToElector(row, headers, index) {

      const data = {};

      headers.forEach((header, idx) => {
        data[header] = (row[idx] || "").trim();
      });

      const sourceRow = index + 2;

      const id =
        data.electorid ||
        row[20] ||
        ("row-" + sourceRow);

      const name =
        data.electorname ||
        data.name ||
        data.elector ||
        "";

      return {

        id: String(id),

        name,

        householdId:
          data.householdid ||
          row[19] ||
          "",

        addressLine1: welshProperCase(stripExcludedTownWords(data.address1)),

        addressLine2: welshProperCase(stripExcludedTownWords(data.address2)),

        postcode: data.postcode || "",

        postalProxy:
          formatPostalProxy(
            data.postalproxy ||
            data.postalorproxy ||
            row[17] ||
            ""
          ),

        pollingDistrict:
          data.pollingdistrict ||
          data.pollingdist ||
          data.district ||
          data.pd ||
          row[15] ||
          "",

        // The Sheet's own Walk column (AL), used as the default Walk
        // when no override has been saved on the Manage Walks page -
        // keeps this page's colours in sync with Manage Walks.
        deliveryWalk:
          data.walk ||
          row[37] ||
          "",

        subRoad:
          data.subroad ||
          row[40] ||
          "",

        lat:
          parseFloat(
            data.latitude ||
            data.lat ||
            row[21]
          ),

        lng:
          parseFloat(
            data.longitude ||
            data.lng ||
            data.lon ||
            row[22]
          ),

        householdGroupKey:
          normalizeText(
            data.householdkey ||
            data.key ||
            row[11] ||
            ""
          )

      };

    }

    function getElectorProgress(electorId, progress) {

      const existing = progress[electorId] || {};

      return {
        canvassId: existing.canvassId || existing.status || "No Data",
        supportIndependence: existing.supportIndependence || "No Data",
        firstLanguage: existing.firstLanguage || "English",
        phone: existing.phone || "",
        email: existing.email || "",
        doNotDeliver: Boolean(existing.doNotDeliver),
        doNotContact: Boolean(existing.doNotContact)
      };

    }

    function hasAntiPlaidFlag(progress) {
      return Boolean(progress && (progress.doNotDeliver || progress.doNotContact));
    }

    // Resolves a household's Subroad, preferring a saved household-level
    // override (set on the main list's Delivery Details) over the raw
    // Subroad value from the sheet.
    function resolveSubRoad(elector, areaOverrides) {

      const householdKey = elector.householdGroupKey;

      if (
        householdKey &&
        areaOverrides[householdKey] !== undefined
      ) {
        return areaOverrides[householdKey];
      }

      return elector.subRoad || "";

    }

    // Each household's Walk can be reassigned individually on the Manage
    // Walks page. If no override has been saved, fall back to the Sheet's
    // own Walk column (AL) so this page's colours stay in sync with
    // Manage Walks, and only default to Walk 1 if neither is present.
    // A walk can never cross Polling Districts.
    function getWalkForHousehold(household, walkOverrides) {

      const override = walkOverrides[household.key];

      if (override) {
        return String(override);
      }

      const match = String(household.deliveryWalk || "").match(/\d+/);

      return match ? match[0] : "1";

    }

    function walkDescriptionKey(pollingDistrict, walkNumber) {
      return (
        normalizeText(pollingDistrict) + "|" + walkNumber
      );
    }

    function getWalkDescription(pollingDistrict, walkNumber, walkDescriptions) {
      const key = walkDescriptionKey(pollingDistrict, walkNumber);
      if (walkDescriptions[key] !== undefined) {
        return walkDescriptions[key];
      }
      return DEFAULT_WALK_DESCRIPTIONS[key] || "";
    }

    // Groups a flat elector list into one entry per Household ID, keeping
    // the first elector's address/coordinates as representative of the
    // whole household (all electors sharing a Household ID live at the
    // same property). This guarantees exactly one marker per Household ID
    // even if multiple electors at that address have differing KEY 1
    // values.
    function buildHouseholds(electors, areaOverrides) {

      const order = [];
      const byKey = new Map();

      electors.forEach(elector => {

        const key = elector.householdId || elector.householdGroupKey;

        if (!byKey.has(key)) {
          byKey.set(key, {
            key,
            addressLine1: elector.addressLine1,
            addressLine2: elector.addressLine2,
            lat: elector.lat,
            lng: elector.lng,
            electorCount: 0,
            pollingDistrict: elector.pollingDistrict || "",
            subRoad: resolveSubRoad(elector, areaOverrides),
            deliveryWalk: elector.deliveryWalk || ""
          });
          order.push(key);
        }

        const household = byKey.get(key);
        household.electorCount += 1;

        if (!household.pollingDistrict && elector.pollingDistrict) {
          household.pollingDistrict = elector.pollingDistrict;
        }

        if (!household.deliveryWalk && elector.deliveryWalk) {
          household.deliveryWalk = elector.deliveryWalk;
        }

        if (!household.subRoad) {
          const subRoad = resolveSubRoad(elector, areaOverrides);
          if (subRoad) {
            household.subRoad = subRoad;
          }
        }

        // Prefer any elector record within the household that actually
        // has usable coordinates, in case the first one is missing them.
        if (
          (household.lat === null || household.lat === undefined || isNaN(household.lat)) &&
          !isNaN(elector.lat)
        ) {
          household.lat = elector.lat;
          household.lng = elector.lng;
        }

      });

      return order.map(key => byKey.get(key));

    }

    let leafletMap = null;
    let markersLayer = null;

    function renderMap(households, colorForHousehold) {

      if (!leafletMap) {

        leafletMap = L.map(mapEl);

        L.tileLayer(
          "https://tile.openstreetmap.org/{z}/{x}/{y}.png",
          {
            maxZoom: 18,
            attribution: "&copy; OpenStreetMap contributors"
          }
        ).addTo(leafletMap);

      }

      if (markersLayer) {
        leafletMap.removeLayer(markersLayer);
      }

      const markers = [];

      households.forEach(household => {

        if (
          household.lat === null ||
          household.lat === undefined ||
          isNaN(household.lat) ||
          household.lng === null ||
          household.lng === undefined ||
          isNaN(household.lng)
        ) {
          return;
        }

        const line1 = household.addressLine1 || "";

        const line1WithSubRoad =
          household.subRoad
            ? line1 + " (" + household.subRoad + ")"
            : line1;

        const label =
          escapeHtml(line1WithSubRoad) || "Address unavailable";

        const fillColor =
          colorForHousehold
            ? colorForHousehold(household)
            : DEFAULT_MARKER_COLOR;

        const marker =
          L.circleMarker([household.lat, household.lng], {
            radius: 5,
            color: "#ffffff",
            weight: 1.5,
            fillColor: fillColor,
            fillOpacity: 0.9
          })
            .bindPopup(label)
            .bindTooltip(label, { direction: "top" });

        markers.push(marker);

      });

      markersLayer = L.layerGroup(markers).addTo(leafletMap);

      if (markers.length) {

        const group = L.featureGroup(markers);

        leafletMap.fitBounds(
          group.getBounds().pad(0.15)
        );

      } else {

        // No plottable households - fall back to a view centred on
        // Abersoch gyda Llanengan so the map isn't blank.
        leafletMap.setView([52.8168, -4.4855], 13);

      }

      setTimeout(
        () => leafletMap.invalidateSize(),
        0
      );

    }

    async function init() {

      const sheetUrl =
        localStorage.getItem(STORAGE_KEYS.sheetUrl) ||
        DEFAULT_SHEET_URL;

      const filterState =
        loadFromStorage(
          STORAGE_KEYS.mappingFilter,
          // Matches the main list's default selected Polling District
          // ("RA1 (Abersoch)") so the map shows a sensible household
          // count even if opened directly, without going through the
          // "View Households on Map" button first.
          { pollingDistrict: "ra1", filterType: "" }
        );

      const progress =
        loadFromStorage(STORAGE_KEYS.progress, {});

      const areaOverrides =
        loadFromStorage(STORAGE_KEYS.areaOverrides, {});

      const walkOverrides =
        loadFromStorage(STORAGE_KEYS.walkOverrides, {});

      const walkDescriptions =
        loadFromStorage(STORAGE_KEYS.walkDescriptions, {});

      messageEl.textContent = "Loading electors...";

      try {

        const csvUrl = toGoogleCsvUrl(sheetUrl);
        const response = await fetch(csvUrl);

        if (!response.ok) {
          throw new Error("Could not fetch sheet data.");
        }

        const csvText = await response.text();
        const rows = parseCsv(csvText);
        const headers = rows[0].map(h => normalizeHeader(h));

        const electors =
          rows
            .slice(1)
            .map((row, index) => mapRowToElector(row, headers, index))
            .filter(e => e.name);

        const wantedFilterType =
          filterState.filterType || "";

        // Shared across both display modes: Anti-Plaid and Postal/Proxy
        // filters always apply. Polling District filtering differs
        // between the two modes (see below), so it is applied later.
        const baseFiltered =
          electors.filter(elector => {

            if (wantedFilterType === "postal-proxy") {
              if (
                elector.postalProxy !== "Postal" &&
                elector.postalProxy !== "Proxy"
              ) {
                return false;
              }
            }

            const electorProgress =
              getElectorProgress(elector.id, progress);

            if (hasAntiPlaidFlag(electorProgress)) {
              return false;
            }

            return true;

          });

        function renderWalksLegend(households, walkOverridesMap, pollingDistrict, walkDescriptionsMap) {

          // For each Walk, show how many of its households were actually
          // plotted vs. how many matched in total, e.g. "1 - High Street
          // and Harbour (100/120)".
          const counts = {};

          Object.keys(WALK_COLORS).forEach(walkNumber => {
            counts[walkNumber] = { plotted: 0, total: 0 };
          });

          households.forEach(household => {

            const walkNumber = getWalkForHousehold(household, walkOverridesMap);

            if (!counts[walkNumber]) {
              counts[walkNumber] = { plotted: 0, total: 0 };
            }

            counts[walkNumber].total += 1;

            if (!isNaN(household.lat) && !isNaN(household.lng)) {
              counts[walkNumber].plotted += 1;
            }

          });

          walkKeyEl.innerHTML =
            "<div class=\"walk-key-title\">WALK KEY (PLOTTED/NOT PLOTTED)</div>" +
            "<div class=\"walk-key-grid\">" +
            Object.keys(WALK_COLORS).map(walkNumber => {

              const description =
                getWalkDescription(pollingDistrict, walkNumber, walkDescriptionsMap);

              return (
                "<span class=\"walk-key-item\">" +
                "<span class=\"walk-key-swatch\" style=\"background:" +
                WALK_COLORS[walkNumber] + "\"></span>" +
                walkNumber +
                (description ? " - " + escapeHtml(description) : "") +
                " (" + counts[walkNumber].plotted + "/" +
                (counts[walkNumber].total - counts[walkNumber].plotted) + ")" +
                "</span>"
              );

            }).join("") +
            "</div>";

        }

        let showWalksActive = false;

        function applyAndRender() {

          const showWalks = showWalksActive;

          showWalksToggleEl.textContent =
            showWalks ? "Hide Delivery Walks" : "Show Delivery Walks";
          showWalksToggleEl.classList.toggle("is-active", showWalks);

          walkDistrictRowEl.hidden = !showWalks;
          walkKeyEl.hidden = !showWalks;

          // In "Show delivery walks" mode, the Polling District dropdown
          // (defaulting to RA1) always controls which district is shown,
          // since a walk can never cross Polling Districts and the same
          // Walk number/colour is reused in each district.
          const wantedPollingDistrict =
            showWalks
              ? normalizeText(walkDistrictSelectEl.value || "RA1")
              : normalizeText(filterState.pollingDistrict || "");

          const filtered =
            baseFiltered.filter(elector => {

              if (
                wantedPollingDistrict &&
                normalizeText(elector.pollingDistrict) !== wantedPollingDistrict
              ) {
                return false;
              }

              return true;

            });

          const households = buildHouseholds(filtered, areaOverrides);

          const totalHouseholds = households.length;
          const truncated = totalHouseholds > MAX_HOUSEHOLDS;
          const shownHouseholds = households.slice(0, MAX_HOUSEHOLDS);

          const plottable =
            shownHouseholds.filter(household =>
              !isNaN(household.lat) && !isNaN(household.lng)
            );

          const missingCoords =
            shownHouseholds.length - plottable.length;

          if (plottable.length > MAX_MARKERS) {

            mapEl.hidden = true;

            messageEl.textContent =
              "Map not loaded: this filter would generate " +
              plottable.length +
              " markers, which exceeds the safety limit of " +
              MAX_MARKERS +
              ". Please apply a narrower filter (e.g. a specific Polling District) before displaying the map.";

            summaryEl.textContent = "";

            return;

          }

          mapEl.hidden = false;

          if (showWalks) {

            renderWalksLegend(shownHouseholds, walkOverrides, wantedPollingDistrict, walkDescriptions);

            renderMap(
              shownHouseholds,
              household =>
                WALK_COLORS[getWalkForHousehold(household, walkOverrides)] ||
                DEFAULT_MARKER_COLOR
            );

          } else {

            renderMap(shownHouseholds);

          }

          messageEl.textContent = "";

          summaryEl.textContent =
            shownHouseholds.length +
            " household" + (shownHouseholds.length === 1 ? "" : "s") +
            " shown on the map" +
            (
              missingCoords
                ? " (" + missingCoords + " could not be plotted due to missing geocoding data)."
                : "."
            ) +
            (
              truncated
                ? " Only the first " + MAX_HOUSEHOLDS + " households are shown (" +
                  totalHouseholds + " matched)."
                : ""
            );

        }

        applyAndRender();

        showWalksToggleEl.addEventListener("click", () => {
          showWalksActive = !showWalksActive;
          applyAndRender();
        });
        walkDistrictSelectEl.addEventListener("change", applyAndRender);

      } catch (error) {
        messageEl.textContent = "Unable to load sheet: " + error.message;
      }

    }

    init();

  </script>

</body>
</html>
