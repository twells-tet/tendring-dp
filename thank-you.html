<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thank you — Tendring Democracy Project</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#fcf4ed; color:#0a1a3e; font-family:system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial; }
    .card { max-width:720px; padding:2rem; background:#fff; border:4px solid #e31b23; border-radius:8px; box-shadow:0 10px 30px rgba(10,26,62,0.08); text-align:center; }
    h1 { margin:0 0 0.5rem; color:#e31b23; }
    p { margin:0 0 1rem; font-size:1.1rem; }
    a.button { display:inline-block; background:#e31b23; color:#fff; padding:0.6rem 1rem; border-radius:6px; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Thank you</h1>
    <p>Thank you for your kind donation to support our campaign to end Nigel Farage's career as MP for Clacton.</p>
    <p><button class="button" onclick="navigator.clipboard.writeText('https://tendring-dp.org.uk/').then(() => { this.textContent = 'Link copied! ✓'; setTimeout(() => this.textContent = 'Copy link to share on social media', 2000); })">Copy link to share on social media</button></p>
  </main>

</html>
