<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Donate | Tendring Democracy Project</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<section class="hero">

<div class="container">


<div class="tag">
TENDRING DEMOCRACY PROJECT
</div>


<h1>
SUPPORT THE
<br>
<span class="yellow">CAMPAIGN</span>
</h1>


<p class="lead">
Help us organise volunteers, reach voters and build a democratic alternative in Clacton.
</p>



<form 
action="https://formspree.io/f/YOUR_FORMSPREE_ID"
method="POST"
id="donation-form">


<label>
Donation amount (£)
<br>
<input 
type="number"
name="Donation amount"
min="1"
step="1"
placeholder="Enter amount"
required>
</label>


<br><br>


<label>
Legal first name
<br>
<input 
type="text"
name="Legal first name"
required>
</label>


<br><br>


<label>
Legal surname
<br>
<input 
type="text"
name="Legal surname"
required>
</label>


<br><br>


<label>
Postcode
<br>
<input 
type="text"
name="Postcode"
required>
</label>


<br><br>


<label>

<input 
type="checkbox"
name="Registered to vote in UK"
value="Yes"
required>

I confirm I am registered to vote in the United Kingdom

</label>


<br><br>


<input type="hidden" name="_subject" value="New Tendring Democracy Project donation declaration">


<input type="hidden" name="_next" value="https://YOUR-WEBSITE.com/donate/payment.html">


<button class="btn primary" type="submit">

DONATE NOW →

</button>


</form>


</div>

</section>



</body>

</html>
