<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Donate | Tendring Democracy Project</title>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<section class="hero">

<div class="container">


<div class="tag">
TENDRING DEMOCRACY PROJECT
</div>


<h1>
SUPPORT THE
<br>
<span class="yellow">CAMPAIGN</span>
</h1>


<p class="lead">
Help us organise volunteers, reach voters and build a democratic alternative in Clacton.
</p>



<form id="donation-form">


<label>
Donation amount (£)
<br>

<input 
type="number"
id="amount"
name="amount"
min="1"
step="1"
placeholder="Enter amount"
required>

</label>


<br><br>


<label>
Name as it appears on the electoral register
<br>

<input 
type="text"
id="name"
name="name"
required>

</label>


<br><br>


<label>
Email address
<br>

<input 
type="email"
id="email"
name="email"
required>

</label>


<br><br>


<label>
Postcode
<br>

<input 
type="text"
id="postcode"
name="postcode"
required>

</label>


<br><br>


<label>

<input 
type="checkbox"
id="registered"
name="registered"
required>

I am registered to vote in the United Kingdom

</label>


<br><br>


<p id="error"></p>


<button class="btn primary" type="submit">

CONTINUE TO SECURE PAYMENT →

</button>


</form>


</div>

</section>



<script>

const form = document.getElementById("donation-form");

form.addEventListener("submit", async function(event) {

event.preventDefault();


const data = {

amount: document.getElementById("amount").value,

name: document.getElementById("name").value,

email: document.getElementById("email").value,

postcode: document.getElementById("postcode").value,

registered: document.getElementById("registered").checked

};



try {


const response = await fetch(

"YOUR-WORKER-URL",

{

method: "POST",

headers: {

"Content-Type": "application/json"

},

body: JSON.stringify(data)

}

);



const result = await response.json();



if(result.url) {

window.location.href = result.url;

}

else {

document.getElementById("error").innerText =
"There was a problem starting payment. Please try again.";

}



}

catch(error) {

document.getElementById("error").innerText =
"There was a problem connecting to payment. Please try again.";

}


});


</script>



</body>

</html>
