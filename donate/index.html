<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Donate | Tendring Democracy Project</title>

<link rel="stylesheet" href="../style.css">

</head>

<body>

<section class="hero">

<div class="container">

<div class="tag">
TENDRING DEMOCRACY PROJECT
</div>

<h1>
SUPPORT THE
<br>
<span class="yellow">CAMPAIGN</span>
</h1>

<p class="lead">
Help us organise volunteers, reach voters and build a democratic alternative in Clacton.
</p>


<form id="donation-form">


<label>
Donation amount (£)
<br>
<input 
type="number"
id="amount"
name="amount"
min="1"
step="1"
placeholder="Enter amount"
required>
</label>


<br><br>


<label>
Legal first name
<br>
<input 
type="text"
id="firstName"
required>
</label>


<br><br>


<label>
Legal surname
<br>
<input 
type="text"
id="surname"
required>
</label>


<br><br>


<label>
Postcode
<br>
<input 
type="text"
id="postcode"
required>
</label>


<br><br>


<label>

<input 
type="checkbox"
id="registered"
required>

I confirm I am registered to vote in the United Kingdom

</label>


<br><br>


<button class="btn primary" type="submit">

Proceed to Stripe →

</button>


</form>


</div>

</section>


<script>

document
.getElementById("donation-form")
.addEventListener("submit", async function(e){

e.preventDefault();


const data = {

amount: document.getElementById("amount").value,

firstName: document.getElementById("firstName").value,

surname: document.getElementById("surname").value,

postcode: document.getElementById("postcode").value,

registered: document.getElementById("registered").checked

};


const response = await fetch(
"https://YOUR-BACKEND-URL/create-checkout",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
});


const session = await response.json();


window.location.href = session.url;


});


</script>


</body>

</html>
