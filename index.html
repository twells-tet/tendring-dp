<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penalty Charge Notice Portal</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <h1>Penalty Charge Notice Portal</h1>
    </div>
  </header>

  <main class="container">
    <section class="pcn-form">
      <p>Enter Penalty Charge Notice (PCN) number and vehicle registration</p>
      
      <form>
        <label for="pcn-number">PCN number</label>
        <input type="text" id="pcn-number" name="pcn-number" placeholder="Your PCN number starting with AW followed by 8 digits" required>
        
        <label for="reg-number">Registration number</label>
        <input type="text" id="reg-number" name="reg-number" placeholder="Your vehicle registration number (number plate)" required>
        
        <button type="submit" class="btn-primary">View PCN</button>
      </form>

      <p>You can use this facility to view details, photographs or footage of your PCN.</p>
      <p><a href="#" class="accessibility-link">Our accessibility statement</a></p>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2025 Your Organisation Name</p>
    </div>
  </footer>
</body>
</html>
